{% extends 'uchis_rf/base.html' %}

{% block title %}Редактирование заявки - Учись РФ{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-pencil-square fs-1 text-warning"></i>
                        <h3 class="mt-3">Редактирование заявки</h3>
                        <p class="text-muted">{{ application.course.title }}</p>
                    </div>
                    
                    <form method="post" novalidate>
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="id_course" class="form-label">Курс</label>
                            <select name="course" class="form-select" id="id_course" disabled>
                                <option value="{{ application.course.id }}" selected>{{ application.course.title }}</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_preferred_date" class="form-label">Предпочитаемая дата начала</label>
                            <input type="date" name="preferred_date" class="form-control" 
                                   id="id_preferred_date" value="{{ application.preferred_date|date:'Y-m-d' }}" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="id_payment_method" class="form-label">Способ оплаты</label>
                            <input type="text" name="payment_method" class="form-control" 
                                   id="id_payment_method" value="{{ application.payment_method }}" required>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-save me-2"></i>Сохранить изменения
                            </button>
                            <a href="{% url 'uchis_rf:profile' %}" class="btn btn-outline-secondary">
                                Отмена
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
