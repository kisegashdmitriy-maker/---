{% extends 'uchis_rf/base.html' %}

{% block title %}Подать заявку - Учись РФ{% endblock %}

{% block content %}
<div class="container py-4 py-md-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-3 p-sm-4">
                    <div class="text-center mb-3 mb-sm-4">
                        <i class="bi bi-file-earmark-plus fs-1 text-primary"></i>
                        <h3 class="mt-2 mt-sm-3">Формирование заявки</h3>
                        <p class="text-muted small mb-0">Заполните форму для подачи заявки на обучение</p>
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        <!-- Наименование курса -->
                        <div class="mb-3 mb-sm-4">
                            <label for="course_name" class="form-label fw-semibold">
                                Наименование курса *
                            </label>
                            <select name="course_name" class="form-select form-select-lg" id="course_name" required>
                                <option value="">Выберите курс</option>
                                <option value="Повышение квалификации">Повышение квалификации</option>
                                <option value="Курс переподготовки">Курс переподготовки</option>
                                <option value="Курс по охране труда">Курс по охране труда</option>
                            </select>
                        </div>
                        
                        <!-- Дата начала обучения -->
                        <div class="mb-3 mb-sm-4">
                            <label for="id_preferred_date" class="form-label fw-semibold">
                                Желаемая дата начала обучения *
                            </label>
                            <input type="date" name="preferred_date" class="form-control form-control-lg" 
                                   id="id_preferred_date" required>
                        </div>
                        
                        <!-- Способ оплаты -->
                        <div class="mb-3 mb-sm-4">
                            <label for="id_payment_method" class="form-label fw-semibold">
                                Способ оплаты *
                            </label>
                            <select name="payment_method" class="form-select form-select-lg" 
                                    id="id_payment_method" required>
                                <option value="">Выберите способ оплаты</option>
                                <option value="cash">Наличными</option>
                                <option value="transfer">Перевод по номеру телефона</option>
                            </select>
                        </div>
                        
                        <!-- Кнопка отправки -->
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg fw-semibold">
                                <i class="bi bi-send me-2"></i>Отправить заявку
                            </button>
                            <a href="{% url 'uchis_rf:profile' %}" class="btn btn-outline-secondary">
                                Отмена
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
